name: frameiq
description: FrameIQ - AI-Powered Real-Time Photography Coach
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5+9
  google_mlkit_face_detection: ^0.13.2
  google_mlkit_image_labeling: ^0.14.2
  flutter_riverpod: ^2.5.1
  sensors_plus: ^4.0.2
  flutter_animate: ^4.5.0
  permission_handler: ^11.3.1
  wakelock_plus: ^1.2.5
  path_provider: ^2.1.3
  dio: ^5.4.3+1
  shared_preferences: ^2.2.3
  vibration: ^3.1.8
  gap: ^3.0.1
  lottie: ^3.1.2
  flutter_dotenv: ^5.1.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
